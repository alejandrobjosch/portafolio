<style>
:root {
  --nav-height:72px;

*{box-sizing:border-box}
a{color:inherit;text-decoration:none}

body{

  background:var(--fondo);
}

/* HEADER */
header{
  position:fixed;
  top:0;

section#contacto p { text-align:center; margin-left:auto; margin-right:auto; max-width:700px;}
section#contacto {background:#fcfcfc;color:var(--text-seccion);}
form { max-width:600px;width:100%;margin:30px auto 0 auto;display:flex;flex-direction:column;gap:16px;align-items:center;justify-content:center;}
    form input,form textarea {
      width:100%;padding:14px;border-radius:8px;border:1px solid #ddd;
      font-size:16px;background:#f8f8f8;color:var(--text-seccion);outline:none;
    }

    form button {
      width:100%;padding:14px;border:none;background:#ff6f00;font-size:18px;color:#fff;
      border-radius:8px;cursor:pointer;font-weight:600;letter-spacing:0.5px;transition:background 180ms;
    }
    form button:hover {background:#e26c00;}
.nav-inner{

  width:100%;
  margin:auto;

  justify-content:space-between;
  align-items:center;
  padding:0 20px;

.logo-img{width:140px;}

nav.desktop{

  gap:26px;
}
nav.desktop {display:flex;gap:28px;align-items:center;}
nav.desktop a {color:var(--text-menu);font-weight:500;font-size:14px;padding:8px 6px;transition:color 180ms,transform 180ms;}
nav.desktop a:hover{color:var(--accent);transform:translateY(-3px);}
nav.desktop a{
  color:#fff;
  text-decoration:none;
}

/* HAMBURGER */
.hamburger{
  display:none;
  cursor:pointer;
}

.hamburger span{
  display:block;
  width:24px;
  height:2px;
  background:#fff;
  margin:5px 0;
}

/* OFFCANVAS */
.offcanvas{
  position:fixed;
  right:-100%;
  top:0;
  width:280px;
  height:100vh;
  background:#000;
  padding:40px 20px;
  transition:.3s;
  z-index:300;
}
.offcanvas nav a {color:#fff;font-size:18px;padding:12px 8px;display:block;border-radius:8px;background:none;font-weight:500;transition:background 0.15s,color .15s;}
.offcanvas nav a:hover{background:rgba(255,255,255,0.06);color:var(--accent);}
.offcanvas.open{right:0;}

.offcanvas a{
  display:block;
  color:#fff;
  margin-bottom:15px;
  text-decoration:none;
}

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.4);
  opacity:0;
  pointer-events:none;
  transition:.3s;
  z-index:250;
}

.overlay.show{
  opacity:1;
  pointer-events:auto;
}

/* HERO */
.hero{
  padding-top:120px;
  text-align:center;
}

.hero h1{
  margin:0;
  font-size:32px;
}

/* MASONRY */
.masonry{
  display:flex;
  gap:20px;
  max-width:1100px;
  margin:40px auto;
  padding:0 20px;
}

.column{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.item{
  position:relative;
  overflow:hidden;
  border-radius:14px;
  cursor:pointer;
}

.item img{
  width:100%;
  display:block;
  transition:.4s;
}

.item:hover img{
  transform:scale(1.05);
}

.overlay-item{
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,.7), transparent);
  opacity:0;
  transition:.3s;
}

.item:hover .overlay-item{
  opacity:1;
}

/* LIGHTBOX */
.lightbox{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:5000;
}

.lightbox.active{
  display:flex;
}

.lightbox-box{
  background:#000;
  border-radius:12px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  max-width:90vw;
}

.lightbox-media img,
.lightbox-media video{
  width:100%;
  max-height:75vh;
  object-fit:contain;
  background:#000;
}

.lightbox-footer{

  padding:16px 20px;
  border-top:1px solid rgba(255,255,255,0.1);

.lightbox-footer h3{

  font-size:16px;

.lightbox-footer p{

.close{

  top:30px;
  right:30px;
  color:#fff;
  font-size:30px;
  cursor:pointer;

<script>
const hambtn = document.getElementById('hambtn');
const offcanvas = document.getElementById('offcanvas');
const overlay = document.getElementById('overlay');

hambtn.onclick = () => {
  offcanvas.classList.toggle('open');
  overlay.classList.toggle('show');
};

overlay.onclick = () => {
  offcanvas.classList.remove('open');
  overlay.classList.remove('show');
};

function openLightbox(src,type,cliente,campana){
  const container = document.getElementById('lightboxContent');

  if(type === 'img'){
    container.innerHTML = `
      <div class="lightbox-box">
        <div class="lightbox-media">
          <img src="${src}">
        </div>
        <div class="lightbox-footer">
          <h3>${cliente}</h3>
          <p>${campana}</p>
        </div>
      </div>
    `;
  } else {
    container.innerHTML = `
      <div class="lightbox-box">
        <div class="lightbox-media">
          <video src="${src}" controls autoplay></video>
        </div>
        <div class="lightbox-footer">
          <h3>${cliente}</h3>
          <p>${campana}</p>
        </div>
      </div>
    `;
  }

  document.getElementById('lightbox').classList.add('active');
}

function closeLightbox(){
  const container = document.getElementById('lightboxContent');
  const video = container.querySelector('video');

  if(video){
  video.pause();
  video.currentTime = 0;
  video.load(); // resetea correctamente sin romper audio
}


  container.innerHTML = "";
  document.getElementById('lightbox').classList.remove('active');
}

document.addEventListener('keydown',e=>{
  if(e.key==="Escape") closeLightbox();
});
</script>
